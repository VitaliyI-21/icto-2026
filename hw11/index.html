<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Маска</title>

  <!-- MindAR Face 1.1.5: ця версія - самодостатній глобальний скрипт,
       створює window.MINDAR без ES-import (на відміну від новіших збірок) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-face-three.prod.js"></script>

  <!-- importmap для three -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.137.0/build/three.module.js"
    }
  }
  </script>

  <script src="./main.js" type="module"></script>

  <style>
    html, body { position: relative; margin: 0; width: 100%; height: 100%;
                 overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

    /* Відео з камери та полотно MindAR мають заповнювати екран і бути видимими */
    .mindar-ui-overlay { background: transparent !important; }
    a-scene, canvas, video {
      position: absolute !important;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }
    video { z-index: 0 !important; }
    canvas { z-index: 1 !important; }

    #mask-controls {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; gap: 18px;
    }
    .mask-btn {
      width: 66px; height: 66px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; transition: all 0.2s; color: #fff;
    }
    .mask-btn:hover, .mask-btn.active {
      border-color: #a78bfa; background: rgba(167,139,250,0.25);
      box-shadow: 0 0 22px #a78bfa66;
    }
  </style>
</head>
<body>
  <div id="mask-controls">
    <button class="mask-btn active" id="btn-demon" onclick="switchMask('demon')" title="Чортик">😈</button>
    <button class="mask-btn"        id="btn-sage"  onclick="switchMask('sage')"  title="Мудрець">🐸</button>
  </div>
</body>
</html>
