<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Маска</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

    #mask-controls {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; gap: 18px;
    }
    .mask-btn {
      width: 66px; height: 66px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; transition: all 0.2s; color: #fff;
    }
    .mask-btn:hover, .mask-btn.active {
      border-color: #a78bfa; background: rgba(167,139,250,0.25);
      box-shadow: 0 0 22px #a78bfa66;
    }
    a-scene { display: block; }
  </style>
</head>
<body>

<!-- Mask switch buttons -->
<div id="mask-controls">
  <button class="mask-btn active" id="btn-demon" onclick="switchMask('demon')" title="Чортик">😈</button>
  <button class="mask-btn"        id="btn-sage"  onclick="switchMask('sage')"  title="Мудрець">🐸</button>
</div>

<a-scene
  id="arScene"
  mindar-face
  embedded
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  style="position:fixed; inset:0; width:100%; height:100%;"
>
  <a-camera active="false" position="0 0 0"></a-camera>

  <a-entity mindar-face-target="anchorIndex: 1">

    <!-- ============ ЧОРТИК (default) ============ -->
    <a-entity id="mask-demon" visible="true">

      <!-- Red glowing eyes -->
      <a-entity position="-0.16 0.05 0.07">
        <a-ring radius-inner="0.020" radius-outer="0.042"
                material="color:#ff2200; emissive:#ff4400; emissiveIntensity:3; opacity:0.9; transparent:true"
                animation="property:material.emissiveIntensity; from:2; to:5; loop:true; dur:600; dir:alternate; easing:easeInOutSine"></a-ring>
        <a-circle radius="0.020" material="color:#1a0000; emissive:#550000; emissiveIntensity:1"></a-circle>
      </a-entity>
      <a-entity position="0.16 0.05 0.07">
        <a-ring radius-inner="0.020" radius-outer="0.042"
                material="color:#ff2200; emissive:#ff4400; emissiveIntensity:3; opacity:0.9; transparent:true"
                animation="property:material.emissiveIntensity; from:2; to:5; loop:true; dur:800; dir:alternate; easing:easeInOutSine"></a-ring>
        <a-circle radius="0.020" material="color:#1a0000; emissive:#550000; emissiveIntensity:1"></a-circle>
      </a-entity>

      <!-- Horns -->
      <a-entity position="-0.12 0.35 0.03">
        <a-cone radius-bottom="0.025" radius-top="0.004" height="0.16"
                material="color:#1a0000; emissive:#330000; emissiveIntensity:0.5"
                rotation="0 0 -15"></a-cone>
      </a-entity>
      <a-entity position="0.12 0.35 0.03">
        <a-cone radius-bottom="0.025" radius-top="0.004" height="0.16"
                material="color:#1a0000; emissive:#330000; emissiveIntensity:0.5"
                rotation="0 0 15"></a-cone>
      </a-entity>

      <!-- Forehead glyph -->
      <a-entity position="0 0.22 0.06">
        <a-plane width="0.004" height="0.07" color="#ff0000"
                 material="color:#ff0000; emissive:#ff2200; emissiveIntensity:2; opacity:0.8; transparent:true"></a-plane>
        <a-plane width="0.06" height="0.004" color="#ff0000"
                 material="color:#ff0000; emissive:#ff2200; emissiveIntensity:2; opacity:0.8; transparent:true"></a-plane>
      </a-entity>

      <!-- Cheek runes -->
      <a-entity position="-0.22 -0.02 0.05" rotation="0 0 30">
        <a-plane width="0.004" height="0.06" color="#cc0000"
                 material="color:#cc0000; emissive:#ff0000; emissiveIntensity:1.5; opacity:0.7; transparent:true"></a-plane>
        <a-plane width="0.04" height="0.004" color="#cc0000" position="0 0.015 0"
                 material="color:#cc0000; emissive:#ff0000; emissiveIntensity:1.5; opacity:0.7; transparent:true"></a-plane>
        <a-plane width="0.03" height="0.004" color="#cc0000" position="0 -0.015 0"
                 material="color:#cc0000; emissive:#ff0000; emissiveIntensity:1.5; opacity:0.7; transparent:true"></a-plane>
      </a-entity>
      <a-entity position="0.22 -0.02 0.05" rotation="0 0 -30">
        <a-plane width="0.004" height="0.06" color="#cc0000"
                 material="color:#cc0000; emissive:#ff0000; emissiveIntensity:1.5; opacity:0.7; transparent:true"></a-plane>
        <a-plane width="0.04" height="0.004" color="#cc0000" position="0 0.015 0"
                 material="color:#cc0000; emissive:#ff0000; emissiveIntensity:1.5; opacity:0.7; transparent:true"></a-plane>
        <a-plane width="0.03" height="0.004" color="#cc0000" position="0 -0.015 0"
                 material="color:#cc0000; emissive:#ff0000; emissiveIntensity:1.5; opacity:0.7; transparent:true"></a-plane>
      </a-entity>

      <!-- Mouth + fangs -->
      <a-entity position="0 -0.14 0.07">
        <a-plane width="0.16" height="0.003" color="#ff0000"
                 material="color:#ff0000; emissive:#ff0000; emissiveIntensity:2; opacity:0.7; transparent:true"></a-plane>
        <a-plane width="0.018" height="0.032" color="#880000" position="-0.03 -0.015 0"
                 material="color:#880000; emissive:#ff0000; emissiveIntensity:0.5; opacity:0.8; transparent:true"></a-plane>
        <a-plane width="0.018" height="0.032" color="#880000" position="0.03 -0.015 0"
                 material="color:#880000; emissive:#ff0000; emissiveIntensity:0.5; opacity:0.8; transparent:true"></a-plane>
      </a-entity>

      <!-- Hellfire aura -->
      <a-sphere radius="0.38" position="0 0 -0.05"
                material="color:#330000; emissive:#660000; emissiveIntensity:0.5; opacity:0.10; transparent:true; side:back"
                animation="property:material.emissiveIntensity; from:0.3; to:0.8; loop:true; dur:400; dir:alternate; easing:easeInOutSine"></a-sphere>
    </a-entity>

    <!-- ============ ДАВНІЙ МУДРЕЦЬ ============ -->
    <a-entity id="mask-sage" visible="false">

      <!-- Green face overlay -->
      <a-sphere radius="0.20" position="0 -0.02 0.02" scale="1 1.15 0.6"
                material="color:#7a9b54; emissive:#3d5128; emissiveIntensity:0.3; opacity:0.55; transparent:true"></a-sphere>

      <!-- Big pointed ears -->
      <a-entity position="-0.30 0.06 0" rotation="0 0 -50">
        <a-cone radius-bottom="0.07" radius-top="0.004" height="0.26"
                material="color:#86a860; emissive:#4a5e30; emissiveIntensity:0.3; opacity:0.92; transparent:true"
                scale="0.6 1 0.4"></a-cone>
        <a-cone radius-bottom="0.045" radius-top="0.003" height="0.20" position="0 0 0.01"
                material="color:#9cb874; emissive:#5a7038; emissiveIntensity:0.3; opacity:0.9; transparent:true"
                scale="0.6 1 0.4"></a-cone>
      </a-entity>
      <a-entity position="0.30 0.06 0" rotation="0 0 50">
        <a-cone radius-bottom="0.07" radius-top="0.004" height="0.26"
                material="color:#86a860; emissive:#4a5e30; emissiveIntensity:0.3; opacity:0.92; transparent:true"
                scale="0.6 1 0.4"></a-cone>
        <a-cone radius-bottom="0.045" radius-top="0.003" height="0.20" position="0 0 0.01"
                material="color:#9cb874; emissive:#5a7038; emissiveIntensity:0.3; opacity:0.9; transparent:true"
                scale="0.6 1 0.4"></a-cone>
      </a-entity>

      <!-- Wise large eyes -->
      <a-entity position="-0.15 0.06 0.08">
        <a-circle radius="0.050"
                  material="color:#3a2a1a; emissive:#1a1208; emissiveIntensity:0.5; opacity:0.95; transparent:true"></a-circle>
        <a-circle radius="0.026" position="0 0 0.001"
                  material="color:#0d0805; emissive:#000; emissiveIntensity:0"></a-circle>
        <a-circle radius="0.010" position="0.012 0.012 0.002"
                  material="color:#fff; emissive:#fff; emissiveIntensity:1; opacity:0.8; transparent:true"></a-circle>
      </a-entity>
      <a-entity position="0.15 0.06 0.08">
        <a-circle radius="0.050"
                  material="color:#3a2a1a; emissive:#1a1208; emissiveIntensity:0.5; opacity:0.95; transparent:true"></a-circle>
        <a-circle radius="0.026" position="0 0 0.001"
                  material="color:#0d0805; emissive:#000; emissiveIntensity:0"></a-circle>
        <a-circle radius="0.010" position="-0.012 0.012 0.002"
                  material="color:#fff; emissive:#fff; emissiveIntensity:1; opacity:0.8; transparent:true"></a-circle>
      </a-entity>

      <!-- Brow wrinkles -->
      <a-entity position="0 0.16 0.07">
        <a-plane width="0.14" height="0.004" color="#5a7038" position="0 0 0"
                 material="color:#5a7038; opacity:0.6; transparent:true"></a-plane>
        <a-plane width="0.10" height="0.004" color="#5a7038" position="0 -0.02 0"
                 material="color:#5a7038; opacity:0.5; transparent:true"></a-plane>
        <a-plane width="0.12" height="0.004" color="#5a7038" position="0 -0.04 0"
                 material="color:#5a7038; opacity:0.4; transparent:true"></a-plane>
      </a-entity>

      <!-- Tufts of white hair on sides -->
      <a-entity position="-0.20 0.20 0.02">
        <a-plane width="0.006" height="0.05" color="#e8e8e0" rotation="0 0 20"
                 material="color:#e8e8e0; opacity:0.7; transparent:true"></a-plane>
        <a-plane width="0.006" height="0.04" color="#e8e8e0" rotation="0 0 35" position="0.01 0 0"
                 material="color:#e8e8e0; opacity:0.6; transparent:true"></a-plane>
      </a-entity>
      <a-entity position="0.20 0.20 0.02">
        <a-plane width="0.006" height="0.05" color="#e8e8e0" rotation="0 0 -20"
                 material="color:#e8e8e0; opacity:0.7; transparent:true"></a-plane>
        <a-plane width="0.006" height="0.04" color="#e8e8e0" rotation="0 0 -35" position="-0.01 0 0"
                 material="color:#e8e8e0; opacity:0.6; transparent:true"></a-plane>
      </a-entity>

      <!-- Small wise mouth -->
      <a-plane width="0.07" height="0.004" color="#3d2a1a" position="0 -0.15 0.07"
               material="color:#3d2a1a; opacity:0.7; transparent:true"></a-plane>

      <!-- Mystic Force aura -->
      <a-sphere radius="0.40" position="0 0 -0.08"
                material="color:#2a4a1a; emissive:#4a7028; emissiveIntensity:0.3; opacity:0.08; transparent:true; side:back"
                animation="property:material.emissiveIntensity; from:0.2; to:0.5; loop:true; dur:3000; dir:alternate; easing:easeInOutSine"></a-sphere>

      <!-- Floating sparkles -->
      <a-sphere radius="0.006" position="-0.28 0.22 0.04"
                material="color:#aaffaa; emissive:#88ff88; emissiveIntensity:4"
                animation="property:scale; from:1 1 1; to:1.6 1.6 1.6; loop:true; dur:1000; dir:alternate"></a-sphere>
      <a-sphere radius="0.005" position="0.30 0.18 0.04"
                material="color:#aaffaa; emissive:#88ff88; emissiveIntensity:4"
                animation="property:scale; from:1 1 1; to:1.6 1.6 1.6; loop:true; dur:1300; dir:alternate"></a-sphere>
    </a-entity>

  </a-entity>

  <a-light type="ambient" color="#445" intensity="0.5"></a-light>
  <a-light type="directional" color="#fff" intensity="0.8" position="0 1 2"></a-light>
</a-scene>

<script>
  function switchMask(name) {
    ['demon','sage'].forEach(m => {
      document.getElementById('mask-' + m).setAttribute('visible', m === name ? 'true' : 'false');
      document.getElementById('btn-' + m).classList.toggle('active', m === name);
    });
  }
</script>
</body>
</html>
