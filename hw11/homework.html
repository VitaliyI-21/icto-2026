<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR - Cyber Face Mask</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      
      /* Індикатор стану завантаження нейромережі */
      #scanning-overlay {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: rgba(0, 0, 0, 0.7);
        color: #00ff66;
        padding: 10px 20px;
        border-radius: 20px;
        font-family: sans-serif;
        font-size: 14px;
        border: 1px solid #00ff66;
        pointer-events: none;
      }
      .hidden { display: none !important; }
    </style>

    <script>
      // Чекаємо готовності AR-рушія, щоб сховати напис завантаження
      document.addEventListener("DOMContentLoaded", () => {
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener("arReady", () => {
          document.getElementById('scanning-overlay').innerText = "АР-Сканер Активний: Наведіть камеру на обличчя";
        });
      });
    </script>
  </head>
  <body>

    <div id="scanning-overlay">Завантаження нейромережі та активація камери...</div>

    <a-scene mindar-face="autoStart: true;" 
             embedded
             renderer="colorManagement: true; physicallyCorrectLights: false;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="0 1 1" intensity="0.5"></a-light>

      <a-entity mindar-face-target="anchorIndex: 168">
        <a-cone radius-bottom="0.015" radius-top="0" height="0.05" color="#00ffff" 
                rotation="180 0 0" position="0 0.03 0.02"
                material="emissive: #00ffff; emissiveIntensity: 0.5">
        </a-cone>
      </a-entity>

      <a-entity mindar-face-target="anchorIndex: 243">
        <a-cylinder radius="0.03" height="0.01" color="#111" rotation="90 0 0" position="0 0 0.01">
          <a-ring color="#00ff66" radius-inner="0.028" radius-outer="0.032" position="0 0 0.006" material="shader: flat;"></a-ring>
        </a-cylinder>
      </a-entity>

      <a-entity mindar-face-target="anchorIndex: 463">
        <a-cylinder radius="0.03" height="0.01" color="#111" rotation="90 0 0" position="0 0 0.01">
          <a-ring color="#00ff66" radius-inner="0.028" radius-outer="0.032" position="0 0 0.006" material="shader: flat;"></a-ring>
        </a-cylinder>
      </a-entity>

      <a-entity mindar-face-target="anchorIndex: 4">
        <a-box width="0.04" height="0.03" depth="0.03" color="#222" position="0 -0.01 0.01" material="roughness: 0.3; metalness: 0.8">
          <a-box width="0.03" height="0.005" depth="0.032" color="#00ff66" position="0 0 0" material="shader: flat;"></a-box>
        </a-box>
      </a-entity>

      <a-entity mindar-face-target="anchorIndex: 10">
        <a-box width="0.06" height="0.015" depth="0.01" color="#333">
          <a-sphere radius="0.008" color="#ff0055" position="0 0.015 0" animation="property: material.emissive; from: #000; to: #ff0055; dur: 500; dir: alternate; loop: true"></a-sphere>
        </a-box>
      </a-entity>

    </a-scene>
  </body>
</html>
