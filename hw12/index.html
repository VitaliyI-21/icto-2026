<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR: моделі ліворуч і праворуч від обличчя</title>

  <!-- MindAR Face 1.1.5 (самодостатній глобальний скрипт) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-face-three.prod.js"></script>

  <!-- importmap: three + addons (для GLTFLoader у loader.js) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.137.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.137.0/examples/jsm/"
    }
  }
  </script>

  <script src="./main.js" type="module"></script>

  <style>
    html, body { position: relative; margin: 0; width: 100%; height: 100%;
                 overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

    /* Відео з камери знизу, полотно Three.js зверху */
    .mindar-ui-overlay { background: transparent !important; }
    a-scene, canvas, video {
      position: absolute !important;
      top: 0; left: 0;
      width: 100% !important; height: 100% !important;
      object-fit: cover;
    }
    video { z-index: 0 !important; }
    canvas { z-index: 1 !important; }

    #info {
      position: fixed; top: 0; left: 0; right: 0; z-index: 5;
      padding: 12px 16px; color: #e8e8f0; font-size: 0.85rem; line-height: 1.5;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      pointer-events: none;
    }
    #info b { color: #a78bfa; }
    #err {
      position: fixed; top: 64px; left: 12px; right: 12px; z-index: 20;
      background: rgba(180,30,30,0.92); color: #fff; padding: 12px 16px;
      border-radius: 10px; font-size: 0.85rem; display: none; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="info">
    <b>AR-сцена.</b> Дві моделі закріплені за обличчям:
    🦩 <b>ліворуч</b> та 🦜 <b>праворуч</b> від голови — рухаються разом з нею.
  </div>
  <div id="err"></div>
</body>
</html>
