<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Quadrilateral & Triangle Analyzer (MindAR)</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Стилізована HUD панель для виведення розрахунків поверх AR камери */
      #ar-hud {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.85);
        color: #00ff66;
        font-family: 'Courier New', monospace;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #00ff66;
        max-width: 320px;
        font-size: 13px;
        pointer-events: none;
      }
      #ar-hud h3 { margin: 0 0 10px 0; color: #fff; font-size: 16px; text-align: center; }
      .status { color: #ff3333; }
      .active { color: #00ff66; }
    </style>

    <script>
      // Компонент для керування геометрією та прорахунком метрик
      AFRAME.registerComponent('quad-analyzer', {
        init: function() {
          // Мапінг маркерів
          this.markers = {
            'A': document.getElementById('marker-a'),
            'B': document.getElementById('marker-b'),
            'C': document.getElementById('marker-c'),
            'D': document.getElementById('marker-d')
          };

          this.visibleStates = { 'A': false, 'B': false, 'C': false, 'D': false };
          this.hudElement = document.getElementById('hud-content');

          // Налаштування подій виявлення маркерів
          Object.keys(this.markers).forEach(id => {
            this.markers[id].addEventListener('targetFound', () => { this.visibleStates[id] = true; });
            this.markers[id].addEventListener('targetLost', () => { this.visibleStates[id] = false; });
          });

          // Створення динамічних ліній контуру між маркерами
          this.lines = {};
          const pairs = ['AB', 'BC', 'CD', 'DA', 'AC', 'BD']; // Сторони та діагоналі
          pairs.forEach(pair => {
            let el = document.createElement('a-cylinder');
            el.setAttribute('radius', '0.015');
            el.setAttribute('material', pair.length === 2 && ['AC', 'BD'].includes(pair) ? 'color: #ffaa00; opacity: 0.5' : 'color: #00ff66');
            el.setAttribute('visible', false);
            this.el.appendChild(el);
            this.lines[pair] = el;
          });
        },

        // Обчислення площі трикутника за формулою Герона
        getTriangleArea: function(d1, d2, d3) {
          let p = (d1 + d2 + d3) / 2;
          let area = Math.sqrt(p * (p - d1) * (p - d2) * (p - d3));
          return isNaN(area) ? 0 : area;
        },

        // Оновлення геометрії циліндра-лінії між двома точками
        updateLinePosition: function(lineEl, pA, pB) {
          let distance = pA.distanceTo(pB);
          lineEl.setAttribute('height', distance);
          
          let midPoint = new THREE.Vector3().addVectors(pA, pB).multiplyScalar(0.5);
          lineEl.setAttribute('position', midPoint);

          // Орієнтація вздовж вектора з'єднання
          lineEl.object3D.lookAt(pB);
          lineEl.object3D.rotateX(Math.PI / 2);
          lineEl.setAttribute('visible', true);
        },

        tick: function() {
          let positions = {};
          let hudText = "";

          // Зчитування світових координат тільки для видимих маркерів
          Object.keys(this.markers).forEach(id => {
            let statusDot = this.visibleStates[id] ? "<span class='active'>●</span>" : "<span class='status'>○</span>";
            hudText += `Маркер ${id}: ${statusDot} ${this.visibleStates[id] ? 'Видно' : 'Трансляція...'}<br>`;
            
            if (this.visibleStates[id]) {
              positions[id] = new THREE.Vector3();
              this.markers[id].object3D.getWorldPosition(positions[id]);
            }
          });
          hudText += "<hr>";

          // Приховуємо всі лінії за замовчуванням перед ітерацією
          Object.keys(this.lines).forEach(k => this.lines[k].setAttribute('visible', false));

          // Розрахунок відстаней між парами
          let d = {};
          const checkRenderLine = (id1, id2) => {
            if (positions[id1] && positions[id2]) {
              let key = id1 + id2;
              d[key] = positions[id1].distanceTo(positions[id2]);
              this.updateLinePosition(this.lines[key], positions[id1], positions[id2]);
              return true;
            }
            return false;
          };

          let hasAB = checkRenderLine('A', 'B'), hasBC = checkRenderLine('B', 'C'),
              hasCD = checkRenderLine('C', 'D'), hasDA = checkRenderLine('D', 'A'),
              hasAC = checkRenderLine('A', 'C'), hasBD = checkRenderLine('B', 'D');

          // 1. Обчислення периметру чотирикутника ABCD (потрібні всі 4 маркерні точки)
          if (hasAB && hasBC && hasCD && hasDA) {
            let perimeter = d['AB'] + d['BC'] + d['CD'] + d['DA'];
            hudText += `<b>Периметр ABCD:</b> ${perimeter.toFixed(3)} м<br><br>`;
          } else {
            hudText += `<b>Периметр ABCD:</b> <span class='status'>Неможливо обчислити</span> (потрібні всі 4 маркери)<br><br>`;
          }

          hudText += "<b>Площі трикутників:</b><br>";

          // 2. Обчислення площ усіх можливих комбінацій трикутників (потрібно 3 відповідні точки)
          // Трикутник ABC
          if (positions['A'] && positions['B'] && positions['C']) {
            let s = this.getTriangleArea(positions['A'].distanceTo(positions['B']), positions['B'].distanceTo(positions['C']), positions['C'].distanceTo(positions['A']));
            hudText += `• ΔABC: ${s.toFixed(4)} м²<br>`;
          } else { hudText += `• ΔABC: <span class='status'>немає даних</span><br>`; }

          // Трикутник ABD
          if (positions['A'] && positions['B'] && positions['D']) {
            let s = this.getTriangleArea(positions['A'].distanceTo(positions['B']), positions['B'].distanceTo(positions['D']), positions['D'].distanceTo(positions['A']));
            hudText += `• ΔABD: ${s.toFixed(4)} м²<br>`;
          } else { hudText += `• ΔABD: <span class='status'>немає даних</span><br>`; }

          // Трикутник ACD
          if (positions['A'] && positions['C'] && positions['D']) {
            let s = this.getTriangleArea(positions['A'].distanceTo(positions['C']), positions['C'].distanceTo(positions['D']), positions['D'].distanceTo(positions['A']));
            hudText += `• ΔACD: ${s.toFixed(4)} м²<br>`;
          } else { hudText += `• ΔACD: <span class='status'>немає даних</span><br>`; }

          // Трикутник BCD
          if (positions['B'] && positions['C'] && positions['D']) {
            let s = this.getTriangleArea(positions['B'].distanceTo(positions['C']), positions['C'].distanceTo(positions['D']), positions['D'].distanceTo(positions['B']));
            hudText += `• ΔBCD: ${s.toFixed(4)} м²<br>`;
          } else { hudText += `• ΔBCD: <span class='status'>немає даних</span><br>`; }

          this.hudElement.innerHTML = hudText;
        }
      });
    </script>
  </head>
  <body>

    <div id="ar-hud">
      <h3>AR Геометрія</h3>
      <div id="hud-content">Ініціалізація камери...</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; maxTrack: 4" 
             embedded
             renderer="colorManagement: true, physicallyCorrectLights"
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false"
             quad-analyzer>
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="marker-a" mindar-image-target="targetIndex: 0">
        <a-sphere radius="0.03" color="#ff3333"></a-sphere>
        <a-text value="A" position="-0.05 0.1 0" color="white" width="3" font="monoid"></a-text>
      </a-entity>

      <a-entity id="marker-b" mindar-image-target="targetIndex: 1">
        <a-sphere radius="0.03" color="#3333ff"></a-sphere>
        <a-text value="B" position="-0.05 0.1 0" color="white" width="3" font="monoid"></a-text>
      </a-entity>

      <a-entity id="marker-c" mindar-image-target="targetIndex: 2">
        <a-sphere radius="0.03" color="#33ff33"></a-sphere>
        <a-text value="C" position="-0.05 0.1 0" color="white" width="3" font="monoid"></a-text>
      </a-entity>

      <a-entity id="marker-d" mindar-image-target="targetIndex: 3">
        <a-sphere radius="0.03" color="#ffff33"></a-sphere>
        <a-text value="D" position="-0.05 0.1 0" color="white" width="3" font="monoid"></a-text>
      </a-entity>

    </a-scene>
  </body>
</html>
