<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR - Scene</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // Компонент процедурного рендерингу "відеокадру" через HTML5 Canvas всередині WebGL текстури
      // Це повністю нівелює помилки CORS 403 / 404 та вимоги користувацького кліку
      AFRAME.registerComponent('procedural-canvas-texture', {
        init: function () {
          this.canvas = document.createElement('canvas');
          this.canvas.width = 512;
          this.canvas.height = 512;
          this.ctx = this.canvas.getContext('2d');
          this.angle = 0;

          // Реєструємо canvas як текстуру всередині системи Three.js
          this.texture = new THREE.CanvasTexture(this.canvas);
          let mesh = this.el.getObject3D('mesh');
          if (mesh) {
            mesh.material.map = this.texture;
            mesh.material.needsUpdate = true;
          } else {
            this.el.addEventListener('object3dset', () => {
              this.el.getObject3D('mesh').material.map = this.texture;
            });
          }
        },
        tick: function () {
          // Генерація динамічної анімації (імітація відеопотоку)
          this.angle += 0.05;
          let ctx = this.ctx;
          let w = this.canvas.width;
          let h = this.canvas.height;

          ctx.fillStyle = "#0d0d25";
          ctx.fillRect(0, 0, w, h);

          // Малюємо пульсуючі кола кібер-інтерфейсу
          ctx.strokeStyle = "#00ff66";
          ctx.lineWidth = 6;
          ctx.beginPath();
          ctx.arc(w/2, h/2, 120 + Math.sin(this.angle) * 30, 0, Math.PI * 2);
          ctx.stroke();

          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 28px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("AR SCANNER ACTIVE", w/2, h/2 + 10);

          // Сигнал сканування лінії
          let lineY = (Math.sin(this.angle) * (h/2)) + (h/2);
          ctx.strokeStyle = "rgba(0, 255, 102, 0.5)";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(20, lineY);
          ctx.lineTo(w - 20, lineY);
          ctx.stroke();

          this.texture.needsUpdate = true;
        }
      });
    </script>
  </head>
  <body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; maxTrack: 2;" 
             embedded
             renderer="colorManagement: true; physicallyCorrectLights: false;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane width="1" height="1" position="0 0 0" material="shader: flat;" procedural-canvas-texture></a-plane>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-sphere radius="0.15" color="#00bfff" material="roughness: 0.2; metalness: 0.8"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
          
          <a-box position="-0.35 0 0" width="0.4" height="0.12" depth="0.02" color="#111111" material="roughness: 0.1">
            <a-grid color="#00ffcc" cell-size="0.02"></a-grid>
          </a-box>

          <a-box position="0.35 0 0" width="0.4" height="0.12" depth="0.02" color="#111111" material="roughness: 0.1">
            <a-grid color="#00ffcc" cell-size="0.02"></a-grid>
          </a-box>

          <a-cone position="0 0.2 0" radius-bottom="0.03" radius-top="0" height="0.1" color="#d2b48c"></a-cone>
        </a-sphere>
      </a-entity>

    </a-scene>
  </body>
</html>
