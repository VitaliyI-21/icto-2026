<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR - Multi-target Video and 3D Model</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      
      /* Кнопка активації звуку/відео для мобільних браузерів */
      #play-button {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        padding: 12px 24px;
        background: #00ff66;
        color: #000;
        border: none;
        border-radius: 25px;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
    </style>

    <script>
      // Компонент для автоматичного керування відео при знаходженні/втраті маркера
      AFRAME.registerComponent('video-handler', {
        init: function () {
          this.video = document.querySelector('#ar-video');
          this.marker = this.el;

          this.marker.addEventListener('targetFound', () => {
            this.video.play().catch(err => console.log("Чекаємо на клік користувача:", err));
          });

          this.marker.addEventListener('targetLost', () => {
            this.video.pause();
          });
        }
      });

      // Функція для ручного запуску відео після кліку на кнопку UI
      function initVideo() {
        const video = document.querySelector('#ar-video');
        video.play().then(() => {
          // Якщо запуск успішний, ховаємо кнопку
          document.getElementById('play-button').style.display = 'none';
        }).catch(err => {
          console.error("Помилка відтворення:", err);
        });
      }
    </script>
  </head>
  <body>

    <button id="play-button" onclick="initVideo()">Увімкнути AR Відео</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; maxTrack: 2" 
             embedded
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" 
               src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" 
               preload="auto" 
               loop="true" 
               webkit-playsinline 
               playsinline 
               muted="false" 
               crossorigin="anonymous">
        </video>

        <a-asset-item id="drone-model" src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/models/gltf/SciFiHelmet/glTF/SciFiHelmet.gltf"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" video-handler>
        <a-video src="#ar-video" width="1" height="0.5625" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model src="#drone-model" 
                      scale="0.4 0.4 0.4" 
                      position="0 0 0" 
                      rotation="0 0 0"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
        </a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
