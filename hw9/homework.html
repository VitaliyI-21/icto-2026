<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR - 100% Stable AR Video & Model</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      
      /* Кнопка розблокування медіаконтенту для мобільних пристроїв */
      #ar-overlay-btn {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        padding: 15px 30px;
        background: #00ff66;
        color: #000000;
        border: none;
        border-radius: 30px;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      }
    </style>

    <script>
      // Компонент автоматичного керування локальним відео через маркер
      AFRAME.registerComponent('video-controller', {
        init: function () {
          this.video = document.querySelector('#ar-video');
          
          // Подія розпізнавання маркера №0
          this.el.addEventListener('targetFound', () => {
            console.log("Маркер відео розпізнано");
            this.video.play().catch(err => {
              console.log("Очікування натискання на головну кнопку");
            });
          });

          // Подія втрати маркера №0
          this.el.addEventListener('targetLost', () => {
            console.log("Маркер відео втрачено");
            this.video.pause();
          });
        }
      });

      // Функція активації для обходу безпеки iOS/Android
      function startARMedia() {
        const video = document.querySelector('#ar-video');
        video.play().then(() => {
          document.getElementById('ar-overlay-btn').style.display = 'none';
        }).catch(err => {
          console.error("Помилка активації відеопотоку:", err);
        });
      }
    </script>
  </head>
  <body>

    <button id="ar-overlay-btn" onclick="startARMedia()">Запустити AR Контент</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; maxTrack: 2;" 
             embedded
             renderer="colorManagement: true; physicallyCorrectLights: false;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" 
               src="./video.mp4" 
               preload="auto" 
               loop="true" 
               webkit-playsinline 
               playsinline>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>

      <a-entity mindar-image-target="targetIndex: 0" video-controller>
        <a-video src="#ar-video" width="1" height="0.5625" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-sphere radius="0.15" color="#00bfff" material="roughness: 0.2; metalness: 0.8"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
          
          <a-box position="-0.35 0 0" width="0.4" height="0.12" depth="0.02" color="#111111" material="roughness: 0.1">
            <a-grid color="#00ffcc" cell-size="0.02"></a-grid>
          </a-box>

          <a-box position="0.35 0 0" width="0.4" height="0.12" depth="0.02" color="#111111" material="roughness: 0.1">
            <a-grid color="#00ffcc" cell-size="0.02"></a-grid>
          </a-box>

          <a-cone position="0 0.2 0" radius-bottom="0.03" radius-top="0" height="0.1" color="#d2b48c"></a-cone>
        </a-sphere>
      </a-entity>

    </a-scene>
  </body>
</html>
