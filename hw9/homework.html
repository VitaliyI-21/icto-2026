<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR - Fixed Multi-target Scene</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      
      /* Елемент інтерфейсу для активації медіапотоку на мобільних пристроях */
      #ar-overlay-btn {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        padding: 15px 30px;
        background: #00ff66;
        color: #000000;
        border: none;
        border-radius: 30px;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        transition: all 0.2s ease;
      }
      #ar-overlay-btn:active {
        transform: translateX(-50%) scale(0.95);
      }
    </style>

    <script>
      // Компонент контролю відтворення відео при взаємодії з маркером
      AFRAME.registerComponent('video-controller', {
        init: function () {
          this.video = document.querySelector('#ar-video');
          
          // Подія: Маркер знайдено в кадрі
          this.el.addEventListener('targetFound', () => {
            console.log("Маркер відео знайдено");
            this.video.play().catch(err => {
              console.log("Браузер заблокував автоплей. Очікування кліку на кнопку.");
            });
          });

          // Подія: Маркер зник із кадру
          this.el.addEventListener('targetLost', () => {
            console.log("Маркер відео втрачено");
            this.video.pause();
          });
        }
      });

      // Функція ручного тригеру для обходу політики безпеки браузерів
      function startARMedia() {
        const video = document.querySelector('#ar-video');
        video.play().then(() => {
          // Якщо відео успішно стартувало, ховаємо кнопку з екрана
          document.getElementById('ar-overlay-btn').style.display = 'none';
        }).catch(err => {
          console.error("Помилка ініціалізації медіа:", err);
        });
      }
    </script>
  </head>
  <body>

    <button id="ar-overlay-btn" onclick="startARMedia()">Запустити AR Контент</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; maxTrack: 2;" 
             embedded
             renderer="colorManagement: true; physicallyCorrectLights: true;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" 
               src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" 
               preload="auto" 
               loop="true" 
               webkit-playsinline 
               playsinline 
               crossorigin="anonymous">
        </video>

        <a-asset-item id="drone-model" src="https://unpkg.com/three@0.147.0/examples/models/gltf/SciFiHelmet/glTF/SciFiHelmet.gltf"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" video-controller>
        <a-video src="#ar-video" width="1" height="0.5625" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model src="#drone-model" 
                      scale="0.5 0.5 0.5" 
                      position="0 0 0" 
                      rotation="0 0 0"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 9000">
        </a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
