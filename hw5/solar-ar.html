<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Сонячна система — AR</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;font-family:system-ui}
    #hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.7);color:#fff;padding:.5rem 1.2rem;border-radius:8px;
      font-size:.8rem;text-align:center;pointer-events:none;z-index:100;
      border:1px solid #00d4ff;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    #label{position:fixed;top:12px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
      color:#00d4ff;padding:.3rem .9rem;border-radius:6px;font-size:.75rem;
      font-weight:600;letter-spacing:.05em;z-index:100;pointer-events:none}
  </style>
</head>
<body>
<div id="label">🪐 AR — Сонячна система</div>
<div id="hint">📷 Наведіть камеру на маркер із зображенням Землі</div>

<a-scene mindar-image="imageTargetSrc:./targets.mind;autoStart:true;uiLoading:yes;uiError:yes;uiScanning:yes"
         color-space="sRGB"
         renderer="colorManagement:true;antialias:true"
         vr-mode-ui="enabled:false"
         device-orientation-permission-ui="enabled:false">

  <a-assets timeout="20000">
    <img id="t-sun"     src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg/512px-The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg" crossorigin="anonymous"/>
    <img id="t-mercury" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Mercury_in_true_color.jpg/256px-Mercury_in_true_color.jpg" crossorigin="anonymous"/>
    <img id="t-venus"   src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Venus-real_color.jpg/256px-Venus-real_color.jpg" crossorigin="anonymous"/>
    <img id="t-earth"   src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/The_Blue_Marble_%28remastered%29.jpg/256px-The_Blue_Marble_%28remastered%29.jpg" crossorigin="anonymous"/>
    <img id="t-mars"    src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/OSIRIS_Mars_true_color.jpg/256px-OSIRIS_Mars_true_color.jpg" crossorigin="anonymous"/>
    <img id="t-jupiter" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Jupiter_and_its_shrunken_Great_Red_Spot.jpg/256px-Jupiter_and_its_shrunken_Great_Red_Spot.jpg" crossorigin="anonymous"/>
    <img id="t-saturn"  src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Saturn_during_Equinox.jpg/256px-Saturn_during_Equinox.jpg" crossorigin="anonymous"/>
    <img id="t-uranus"  src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Uranus2.jpg/256px-Uranus2.jpg" crossorigin="anonymous"/>
    <img id="t-neptune" src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Neptune_-_Voyager_2_%2829347980845%29_flatten_crop.jpg/256px-Neptune_-_Voyager_2_%2829347980845%29_flatten_crop.jpg" crossorigin="anonymous"/>
  </a-assets>

  <!-- ══ Target 0 = маркер Земля ══ -->
  <a-entity mindar-image-target="targetIndex:0">
    <a-entity rotation="-90 0 0" scale="0.12 0.12 0.12" position="0 0 0">

      <!-- Сонце -->
      <a-sphere position="0 0 0" radius="4" src="#t-sun"
                material="emissive:#ff6600;emissiveIntensity:0.5;shader:standard"
                animation="property:rotation;to:0 360 0;loop:true;dur:20000;easing:linear">
      </a-sphere>
      <a-light type="point" position="0 0 0" color="#fff5e0" intensity="2" decay="1" distance="200"></a-light>
      <a-light type="ambient" color="#222" intensity="0.5"></a-light>

      <!-- Орбіти -->
      <a-entity ar-orbits></a-entity>

      <!-- Меркурій -->
      <a-entity ar-orbit="period:3;radius:7">
        <a-sphere radius="0.35" src="#t-mercury" position="7 0 0"
                  material="shader:standard"
                  animation="property:rotation;to:0 360 0;loop:true;dur:5000;easing:linear"></a-sphere>
      </a-entity>

      <!-- Венера -->
      <a-entity ar-orbit="period:7;radius:11">
        <a-sphere radius="0.9" src="#t-venus" position="11 0 0"
                  material="shader:standard"
                  animation="property:rotation;to:0 -360 0;loop:true;dur:22000;easing:linear"></a-sphere>
      </a-entity>

      <!-- Земля -->
      <a-entity ar-orbit="period:12;radius:16">
        <a-sphere radius="0.95" src="#t-earth" position="16 0 0"
                  material="shader:standard"
                  animation="property:rotation;to:0 360 0;loop:true;dur:1400;easing:linear"></a-sphere>
      </a-entity>

      <!-- Марс -->
      <a-entity ar-orbit="period:19;radius:22">
        <a-sphere radius="0.5" src="#t-mars" position="22 0 0"
                  material="shader:standard"
                  animation="property:rotation;to:0 360 0;loop:true;dur:1400;easing:linear"></a-sphere>
      </a-entity>

      <!-- Юпітер -->
      <a-entity ar-orbit="period:70;radius:36">
        <a-sphere radius="2.6" src="#t-jupiter" position="36 0 0"
                  material="shader:standard"
                  animation="property:rotation;to:0 360 0;loop:true;dur:350;easing:linear"></a-sphere>
      </a-entity>

      <!-- Сатурн + кільця -->
      <a-entity ar-orbit="period:175;radius:52">
        <a-entity position="52 0 0">
          <a-sphere radius="2.1" src="#t-saturn"
                    material="shader:standard"
                    animation="property:rotation;to:0 360 0;loop:true;dur:420;easing:linear"></a-sphere>
          <a-torus radius="3.5" radius-tubular="0.75" segments-tubular="3" segments-radial="60"
                   rotation="90 0 0"
                   material="color:#c8a87a;opacity:0.55;transparent:true;side:double;shader:flat"></a-torus>
        </a-entity>
      </a-entity>

      <!-- Уран -->
      <a-entity ar-orbit="period:500;radius:67">
        <a-sphere radius="1.5" src="#t-uranus" position="67 0 0"
                  material="shader:standard"
                  animation="property:rotation;to:0 360 0;loop:true;dur:600;easing:linear"></a-sphere>
      </a-entity>

      <!-- Нептун -->
      <a-entity ar-orbit="period:950;radius:83">
        <a-sphere radius="1.45" src="#t-neptune" position="83 0 0"
                  material="shader:standard"
                  animation="property:rotation;to:0 360 0;loop:true;dur:580;easing:linear"></a-sphere>
      </a-entity>

    </a-entity>
  </a-entity>

  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
</a-scene>

<script>
// ── AR orbit component (same logic as VR but namespaced) ──
AFRAME.registerComponent('ar-orbit',{
  schema:{period:{type:'number',default:10},radius:{type:'number',default:10}},
  init(){ this._angle=Math.random()*360; },
  tick(t,dt){
    this._angle += (360/(this.data.period*1000))*dt;
    this.el.object3D.rotation.y = this._angle*Math.PI/180;
  }
});

// ── Орбітальні кільця в AR ──
AFRAME.registerComponent('ar-orbits',{
  init(){
    [7,11,16,22,36,52,67,83].forEach(r=>{
      const ring=document.createElement('a-torus');
      ring.setAttribute('radius',r);
      ring.setAttribute('radius-tubular',0.06);
      ring.setAttribute('segments-tubular',100);
      ring.setAttribute('rotation','90 0 0');
      ring.setAttribute('material','color:#334466;opacity:0.3;transparent:true;shader:flat');
      this.el.appendChild(ring);
    });
  }
});

// ── Ховаємо підказку коли маркер знайдено ──
document.querySelector('a-entity[mindar-image-target]')
  .addEventListener('targetFound',()=>{
    document.getElementById('hint').style.display='none';
  });
document.querySelector('a-entity[mindar-image-target]')
  .addEventListener('targetLost',()=>{
    document.getElementById('hint').style.display='block';
  });
</script>
</body>
</html>
