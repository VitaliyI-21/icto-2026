<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Сонячна система — AR</title>
<!-- ПОРЯДОК КРИТИЧНИЙ: A-Frame ПЕРШИМ, потім MindAR -->
<script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#000}
  #topbar{position:fixed;top:0;left:0;right:0;background:linear-gradient(rgba(0,0,0,.8),transparent);
    padding:.6rem;color:#00d4ff;font-family:system-ui;font-size:.77rem;font-weight:600;
    text-align:center;z-index:999;pointer-events:none;letter-spacing:.04em}
  #hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.8);color:#fff;padding:.5rem 1.2rem;border-radius:10px;
    font-size:.8rem;font-family:system-ui;text-align:center;z-index:999;pointer-events:none;
    border:1px solid #00d4ff;animation:pulse 2.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="topbar">🪐 AR — Сонячна система | Наведіть камеру на маркер</div>
<div id="hint">📷 Покажіть маркер (зображення Землі) камері</div>

<a-scene
  mindar-image="imageTargetSrc:./targets.mind;autoStart:true;uiLoading:yes;uiError:yes;uiScanning:yes"
  color-space="sRGB"
  renderer="colorManagement:true;antialias:true"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false">

  <a-assets timeout="30000">
    <img id="a-sun"     src="textures/sun.jpg"    crossorigin="anonymous"/>
    <img id="a-mercury" src="textures/mercury.jpg"crossorigin="anonymous"/>
    <img id="a-venus"   src="textures/venus.jpg"  crossorigin="anonymous"/>
    <img id="a-earth"   src="textures/earth.jpg"  crossorigin="anonymous"/>
    <img id="a-mars"    src="textures/mars.jpg"   crossorigin="anonymous"/>
    <img id="a-jupiter" src="textures/jupiter.jpg"crossorigin="anonymous"/>
    <img id="a-saturn"  src="textures/saturn.jpg" crossorigin="anonymous"/>
    <img id="a-uranus"  src="textures/uranus.jpg" crossorigin="anonymous"/>
    <img id="a-neptune" src="textures/neptune.jpg"crossorigin="anonymous"/>
  </a-assets>

  <a-entity mindar-image-target="targetIndex:0">
    <!-- rotation=-90 бо маркер горизонтальний; scale малий щоб система вміщувалась -->
    <a-entity rotation="-90 0 0" scale="0.065 0.065 0.065">

      <a-light type="point" position="0 0 0" color="#fff8e0" intensity="2.5" decay="1" distance="150"></a-light>
      <a-light type="ambient" color="#111" intensity="0.6"></a-light>

      <!-- Сонце -->
      <a-sphere position="0 0 0" radius="4" src="#a-sun"
                material="emissive:#ff6600;emissiveIntensity:0.6;shader:standard"
                animation="property:rotation;to:0 360 0;loop:true;dur:20000;easing:linear">
      </a-sphere>

      <!-- Орбіти -->
      <a-entity ar-rings></a-entity>

      <!-- Меркурій -->
      <a-entity ar-orb="spd:1.607;r:7">
        <a-sphere radius="0.32" position="7 0 0" src="#a-mercury"
                  material="shader:standard;roughness:0.95"
                  animation="property:rotation;to:0 360 0;loop:true;dur:5000;easing:linear">
        </a-sphere>
      </a-entity>

      <!-- Венера -->
      <a-entity ar-orb="spd:1.174;r:11">
        <a-sphere radius="0.85" position="11 0 0" src="#a-venus"
                  material="shader:standard;roughness:0.85"
                  animation="property:rotation;to:0 -360 0;loop:true;dur:22000;easing:linear">
        </a-sphere>
      </a-entity>

      <!-- Земля -->
      <a-entity ar-orb="spd:1.0;r:16">
        <a-sphere radius="0.9" position="16 0 0" src="#a-earth"
                  material="shader:standard;roughness:0.7"
                  animation="property:rotation;to:0 360 0;loop:true;dur:1400;easing:linear">
        </a-sphere>
      </a-entity>

      <!-- Марс -->
      <a-entity ar-orb="spd:0.802;r:22">
        <a-sphere radius="0.48" position="22 0 0" src="#a-mars"
                  material="shader:standard;roughness:0.98"
                  animation="property:rotation;to:0 360 0;loop:true;dur:1400;easing:linear">
        </a-sphere>
      </a-entity>

      <!-- Юпітер -->
      <a-entity ar-orb="spd:0.434;r:34">
        <a-sphere radius="2.4" position="34 0 0" src="#a-jupiter"
                  material="shader:standard;roughness:0.6"
                  animation="property:rotation;to:0 360 0;loop:true;dur:350;easing:linear">
        </a-sphere>
      </a-entity>

      <!-- Сатурн + кільця -->
      <a-entity ar-orb="spd:0.323;r:49">
        <a-entity position="49 0 0">
          <a-sphere radius="2.0" src="#a-saturn"
                    material="shader:standard;roughness:0.7"
                    animation="property:rotation;to:0 360 0;loop:true;dur:420;easing:linear">
          </a-sphere>
          <a-torus radius="3.1" radius-tubular="0.6" segments-tubular="3" segments-radial="60"
                   rotation="90 0 0" material="color:#c8b577;opacity:0.6;transparent:true;side:double;shader:flat"></a-torus>
          <a-torus radius="4.1" radius-tubular="0.4" segments-tubular="3" segments-radial="60"
                   rotation="90 0 0" material="color:#d4c48e;opacity:0.35;transparent:true;side:double;shader:flat"></a-torus>
        </a-entity>
      </a-entity>

      <!-- Уран -->
      <a-entity ar-orb="spd:0.228;r:63">
        <a-sphere radius="1.4" position="63 0 0" src="#a-uranus"
                  material="shader:standard;roughness:0.5"
                  animation="property:rotation;to:360 0 0;loop:true;dur:600;easing:linear">
        </a-sphere>
      </a-entity>

      <!-- Нептун -->
      <a-entity ar-orb="spd:0.182;r:77">
        <a-sphere radius="1.35" position="77 0 0" src="#a-neptune"
                  material="shader:standard;roughness:0.5"
                  animation="property:rotation;to:0 360 0;loop:true;dur:570;easing:linear">
        </a-sphere>
      </a-entity>

    </a-entity>
  </a-entity>

  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
</a-scene>

<script>
AFRAME.registerComponent('ar-orb',{
  schema:{spd:{type:'number',default:1},r:{type:'number',default:10}},
  init(){this._a=Math.random()*Math.PI*2;},
  tick(_,dt){
    this._a+=(2*Math.PI/16000)*this.data.spd*dt;
    this.el.object3D.rotation.y=this._a;
  }
});

AFRAME.registerComponent('ar-rings',{
  init(){
    [7,11,16,22,34,49,63,77].forEach(r=>{
      const t=document.createElement('a-torus');
      t.setAttribute('radius',r);
      t.setAttribute('radius-tubular','0.06');
      t.setAttribute('segments-tubular','100');
      t.setAttribute('segments-radial','3');
      t.setAttribute('rotation','90 0 0');
      t.setAttribute('material','color:#1a2a44;opacity:0.35;transparent:true;shader:flat;depthWrite:false');
      this.el.appendChild(t);
    });
  }
});

const hint=document.getElementById('hint');
document.querySelector('[mindar-image-target]')
  .addEventListener('targetFound',()=>hint.style.display='none');
document.querySelector('[mindar-image-target]')
  .addEventListener('targetLost', ()=>hint.style.display='block');
</script>
</body>
</html>
