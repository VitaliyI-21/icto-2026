<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Сонячна система — VR</title>

  <!-- A-Frame ПЕРШИМ, завжди -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>

  <style>
    body{margin:0;overflow:hidden;background:#000}
    #ui{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;
      background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
      border:1px solid #334466;border-radius:10px;
      padding:.45rem 1.2rem;color:#e2e8f0;font-family:system-ui;
      font-size:.78rem;text-align:center;pointer-events:none;white-space:nowrap}
    #ui strong{color:#00d4ff}
    #tooltip{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.85);color:#fff;padding:.45rem 1.1rem;
      border-radius:8px;font-family:system-ui;font-size:.82rem;
      display:none;z-index:100;border:1px solid #00d4ff;
      max-width:90vw;text-align:center;pointer-events:none}
  </style>
</head>
<body>
<div id="ui">🪐 <strong>Сонячна система</strong> &nbsp;|&nbsp; WASD = рух &nbsp;|&nbsp; Мишка = огляд &nbsp;|&nbsp; Навести = інфо</div>
<div id="tooltip"></div>

<a-scene background="color:#000008"
         renderer="antialias:true;colorManagement:true"
         stats="false"
         loading-screen="backgroundColor:#000008;dotsColor:#00d4ff">

  <!-- ══ Текстури ══
       Використовуємо NASA / three.js / jeromeetienne — з CORS заголовками
  -->
  <a-assets timeout="60000">
    <!-- Сонце — NASA SDO -->
    <img id="tex-sun"
      src="https://upload.wikimedia.org/wikipedia/commons/b/b4/The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg"
      crossorigin="anonymous"/>
    <!-- Планети — jeromeetienne/threex.planets (GitHub raw, CORS OK) -->
    <img id="tex-mercury"
      src="https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg"
      crossorigin="anonymous"/>
    <!-- Використовуємо три.js earth для демо, інші — кольори через матеріал -->
    <img id="tex-earth"
      src="https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg"
      crossorigin="anonymous"/>
    <img id="tex-moon"
      src="https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/moon_1024.jpg"
      crossorigin="anonymous"/>
    <!-- Зорі -->
    <img id="tex-stars"
      src="https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/2294472375_24a3b8ef46_o.jpg"
      crossorigin="anonymous"/>
  </a-assets>

  <!-- ── Зоряне небо ── -->
  <a-sky src="#tex-stars" radius="4000" rotation="0 -30 0"></a-sky>

  <!-- ── Сонце ── -->
  <a-sphere id="sun" position="0 0 0" radius="4"
            src="#tex-sun"
            material="emissive:#ff8800;emissiveIntensity:0.6;shader:standard"
            animation="property:rotation;to:0 360 0;loop:true;dur:25000;easing:linear"
            class="clickable" data-name="☀️ Сонце"
            data-info="Зірка класу G2V. Маса: 1.989×10³⁰ кг. Радіус: 695 700 км. До найближчої зірки: 4.24 св. роки">
  </a-sphere>

  <!-- Точкове світло від Сонця -->
  <a-light type="point" position="0 0 0" color="#fff5e0"
           intensity="3" decay="2" distance="300"></a-light>
  <a-light type="ambient" color="#0a0a1a" intensity="0.6"></a-light>

  <!-- ══ ОРБІТИ та ПЛАНЕТИ ══ -->

  <!-- Меркурій — сірий -->
  <a-entity orbit="speed:1.607;radius:8">
    <a-sphere radius="0.38" position="8 0 0"
              material="color:#9e9e9e;shader:standard;roughness:0.95;metalness:0.1"
              animation="property:rotation;to:0 360 0;loop:true;dur:5832;easing:linear"
              class="clickable" data-name="☿ Меркурій"
              data-info="1-а планета. Відстань: 57.9 млн км. Рік: 88 днів. Амплітуда температур: -180°C до +430°C">
    </a-sphere>
  </a-entity>

  <!-- Венера — жовтувато-помаранчева -->
  <a-entity orbit="speed:1.174;radius:12">
    <a-sphere radius="0.95" position="12 0 0"
              material="color:#e8c97a;shader:standard;roughness:0.85;emissive:#3d2e00;emissiveIntensity:0.1"
              animation="property:rotation;to:0 -360 0;loop:true;dur:24300;easing:linear"
              class="clickable" data-name="♀ Венера"
              data-info="2-а планета. Відстань: 108.2 млн км. Рік: 225 днів. Температура: +465°C. Обертання зворотне">
    </a-sphere>
  </a-entity>

  <!-- Земля — синьо-зелена з текстурою -->
  <a-entity orbit="speed:1.0;radius:17">
    <a-sphere radius="1.0" position="17 0 0"
              src="#tex-earth"
              material="shader:standard;roughness:0.7;metalness:0.05"
              animation="property:rotation;to:0 360 0;loop:true;dur:1440;easing:linear"
              class="clickable" data-name="🌍 Земля"
              data-info="3-я планета. Відстань: 149.6 млн км. Рік: 365.25 днів. Єдина відома планета з життям">
    </a-sphere>
  </a-entity>

  <!-- Марс — червоний -->
  <a-entity orbit="speed:0.802;radius:23">
    <a-sphere radius="0.53" position="23 0 0"
              material="color:#c1440e;shader:standard;roughness:0.98;metalness:0"
              animation="property:rotation;to:0 360 0;loop:true;dur:1477;easing:linear"
              class="clickable" data-name="♂ Марс"
              data-info="4-а планета. Відстань: 227.9 млн км. Рік: 687 днів. Найвища гора: Олімп (21.9 км)">
    </a-sphere>
  </a-entity>

  <!-- Юпітер — смугастий -->
  <a-entity orbit="speed:0.434;radius:40">
    <a-sphere radius="2.8" position="40 0 0"
              material="color:#c88b3a;shader:standard;roughness:0.6;emissive:#1a0e00;emissiveIntensity:0.05"
              animation="property:rotation;to:0 360 0;loop:true;dur:357;easing:linear"
              class="clickable" data-name="♃ Юпітер"
              data-info="5-а планета. Відстань: 778.5 млн км. Рік: 11.86 р. Найбільша планета. Велика Червона Пляма > 350 р.">
    </a-sphere>
  </a-entity>

  <!-- Сатурн + кільця -->
  <a-entity orbit="speed:0.323;radius:58">
    <a-entity position="58 0 0">
      <a-sphere radius="2.3"
                material="color:#e4d191;shader:standard;roughness:0.7"
                animation="property:rotation;to:0 360 0;loop:true;dur:440;easing:linear"
                class="clickable" data-name="♄ Сатурн"
                data-info="6-а планета. Відстань: 1.432 млрд км. Рік: 29.46 р. Кільця з льоду та пилу. Щільність < води">
      </a-sphere>
      <!-- Кільця Сатурна -->
      <a-torus radius="3.6" radius-tubular="0.65" segments-tubular="3" segments-radial="80"
               rotation="90 0 0"
               material="color:#c8b577;opacity:0.6;transparent:true;side:double;shader:flat"></a-torus>
      <a-torus radius="4.7" radius-tubular="0.5" segments-tubular="3" segments-radial="80"
               rotation="90 0 0"
               material="color:#d4c48e;opacity:0.4;transparent:true;side:double;shader:flat"></a-torus>
      <a-torus radius="5.5" radius-tubular="0.3" segments-tubular="3" segments-radial="80"
               rotation="90 0 0"
               material="color:#bfb07a;opacity:0.2;transparent:true;side:double;shader:flat"></a-torus>
    </a-entity>
  </a-entity>

  <!-- Уран — блакитний, вісь нахилена ~98° -->
  <a-entity orbit="speed:0.228;radius:75">
    <a-sphere radius="1.6" position="75 0 0"
              material="color:#7de8e8;shader:standard;roughness:0.5;metalness:0.1"
              animation="property:rotation;to:360 0 0;loop:true;dur:625;easing:linear"
              class="clickable" data-name="⛢ Уран"
              data-info="7-а планета. Відстань: 2.867 млрд км. Рік: 84 р. Нахил осі 97.8° — обертається «на боці»">
    </a-sphere>
  </a-entity>

  <!-- Нептун — темно-синій -->
  <a-entity orbit="speed:0.182;radius:93">
    <a-sphere radius="1.55" position="93 0 0"
              material="color:#3f54ba;shader:standard;roughness:0.5;metalness:0.15"
              animation="property:rotation;to:0 360 0;loop:true;dur:600;easing:linear"
              class="clickable" data-name="♆ Нептун"
              data-info="8-а планета. Відстань: 4.515 млрд км. Рік: 164.8 р. Найшвидші вітри: 2100 км/год">
    </a-sphere>
  </a-entity>

  <!-- ── Орбітальні кільця ── -->
  <a-entity id="orbit-lines"></a-entity>

  <!-- ── Камера з курсором ── -->
  <a-entity id="rig" position="0 8 55">
    <a-camera wasd-controls="acceleration:30" look-controls>
      <a-cursor color="#00d4ff" opacity="0.8" fuse="false"
                raycaster="objects:.clickable;far:500"></a-cursor>
    </a-camera>
  </a-entity>

</a-scene>

<script>
// ── Реєструємо компонент орбіти ──
AFRAME.registerComponent('orbit', {
  schema: {
    speed:  {type:'number', default:1.0},
    radius: {type:'number', default:10}
  },
  init() {
    // Випадковий початковий кут щоб планети не стояли в ряд
    this._angle = Math.random() * Math.PI * 2;
  },
  tick(time, dt) {
    // Базова швидкість: 1 одиниця = швидкість Землі (повний оборот за ~16 сек реального часу)
    const baseAngularSpeed = (2 * Math.PI) / 16000; // рад/мс
    this._angle += baseAngularSpeed * this.data.speed * dt;
    this.el.object3D.rotation.y = this._angle;
  }
});

// ── Малюємо орбітальні кільця через JS ──
AFRAME.registerComponent('orbit-rings-init', {
  init() {
    const radii = [8, 12, 17, 23, 40, 58, 75, 93];
    const container = document.getElementById('orbit-lines');
    radii.forEach(r => {
      const ring = document.createElement('a-torus');
      ring.setAttribute('radius', r);
      ring.setAttribute('radius-tubular', '0.05');
      ring.setAttribute('segments-tubular', '128');
      ring.setAttribute('segments-radial', '3');
      ring.setAttribute('rotation', '90 0 0');
      ring.setAttribute('material',
        'color:#223366;opacity:0.4;transparent:true;shader:flat;depthWrite:false');
      container.appendChild(ring);
    });
  }
});
document.getElementById('orbit-lines').setAttribute('orbit-rings-init', '');

// ── Тултіп ──
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('.clickable').forEach(el => {
  el.addEventListener('mouseenter', () => {
    tooltip.textContent = `${el.dataset.name}  —  ${el.dataset.info}`;
    tooltip.style.display = 'block';
  });
  el.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });
});
</script>
</body>
</html>
