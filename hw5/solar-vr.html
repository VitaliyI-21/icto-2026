<script>
AFRAME.registerComponent('orbit',{
  schema:{spd:{type:'number',default:1},r:{type:'number',default:10}},
  init(){this._a=Math.random()*Math.PI*2;},
  tick(_,dt){
    this._a+=(2*Math.PI/16000)*this.data.spd*dt;
    this.el.object3D.rotation.y=this._a;
  }
});

AFRAME.registerComponent('orbit-rings',{
  init(){
    [8,13,19,25,42,60,78,96].forEach(r=>{
      const t=document.createElement('a-torus');
      t.setAttribute('radius',r);
      t.setAttribute('radius-tubular','0.05');
      t.setAttribute('segments-tubular','120');
      t.setAttribute('segments-radial','3');
      t.setAttribute('rotation','90 0 0');
      t.setAttribute('material','color:#1a2a44;opacity:0.4;transparent:true;shader:flat;depthWrite:false');
      this.el.appendChild(t);
    });
  }
});

const tip=document.getElementById('tip');
document.querySelectorAll('.pl').forEach(el=>{
  el.addEventListener('mouseenter',()=>{
    tip.textContent=`${el.dataset.name}  —  ${el.dataset.info}`;
    tip.style.display='block';
  });
  el.addEventListener('mouseleave',()=>tip.style.display='none');
});
</script>
