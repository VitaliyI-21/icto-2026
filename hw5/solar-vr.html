<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Сонячна система — VR</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>
  <style>
    #ui{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;
      background:rgba(0,0,0,.65);backdrop-filter:blur(6px);border:1px solid #334;
      border-radius:10px;padding:.5rem 1.2rem;color:#e2e8f0;font-family:system-ui;
      font-size:.8rem;text-align:center;pointer-events:none}
    #ui strong{color:#00d4ff}
    #tooltip{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.8);color:#fff;padding:.4rem 1rem;border-radius:8px;
      font-family:system-ui;font-size:.85rem;display:none;z-index:100;
      border:1px solid #00d4ff;pointer-events:none}
  </style>
</head>
<body>
<div id="ui">🪐 <strong>Сонячна система</strong> — VR режим &nbsp;|&nbsp; WASD = рух &nbsp;|&nbsp; Мишка = огляд</div>
<div id="tooltip"></div>

<a-scene background="color:#000005"
         renderer="antialias:true;colorManagement:true"
         stats="false">

  <!-- ── Assets ── -->
  <a-assets timeout="30000">
    <!-- Текстури з solarsystemscope.com (CC BY) -->
    <img id="tex-sun"     src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b4/The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg/1024px-The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg" crossorigin="anonymous"/>
    <img id="tex-mercury" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Mercury_in_true_color.jpg/600px-Mercury_in_true_color.jpg" crossorigin="anonymous"/>
    <img id="tex-venus"   src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Venus-real_color.jpg/600px-Venus-real_color.jpg" crossorigin="anonymous"/>
    <img id="tex-earth"   src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/The_Blue_Marble_%28remastered%29.jpg/600px-The_Blue_Marble_%28remastered%29.jpg" crossorigin="anonymous"/>
    <img id="tex-mars"    src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/OSIRIS_Mars_true_color.jpg/600px-OSIRIS_Mars_true_color.jpg" crossorigin="anonymous"/>
    <img id="tex-jupiter" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Jupiter_and_its_shrunken_Great_Red_Spot.jpg/600px-Jupiter_and_its_shrunken_Great_Red_Spot.jpg" crossorigin="anonymous"/>
    <img id="tex-saturn"  src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Saturn_during_Equinox.jpg/600px-Saturn_during_Equinox.jpg" crossorigin="anonymous"/>
    <img id="tex-uranus"  src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Uranus2.jpg/600px-Uranus2.jpg" crossorigin="anonymous"/>
    <img id="tex-neptune" src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Neptune_-_Voyager_2_%2829347980845%29_flatten_crop.jpg/600px-Neptune_-_Voyager_2_%2829347980845%29_flatten_crop.jpg" crossorigin="anonymous"/>
    <img id="tex-stars"   src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Milky_Way_Galaxy.jpg/1280px-Milky_Way_Galaxy.jpg" crossorigin="anonymous"/>
  </a-assets>

  <!-- ── Зоряне небо ── -->
  <a-sky src="#tex-stars" radius="5000" rotation="0 -90 0"></a-sky>

  <!-- ── Сонце ── -->
  <a-sphere id="sun" position="0 0 0" radius="4"
            src="#tex-sun"
            material="emissive:#ff6600;emissiveIntensity:0.4;shader:standard"
            animation="property:rotation;to:0 360 0;loop:true;dur:25000;easing:linear"
            class="planet-obj" data-name="Сонце" data-info="Зірка. Маса: 1.989×10³⁰ кг. Радіус: 695 700 км">
  </a-sphere>

  <!-- Світло від Сонця -->
  <a-light type="point" position="0 0 0" color="#fff5e0" intensity="2.5" decay="1" distance="500"></a-light>
  <a-light type="ambient" color="#111" intensity="0.4"></a-light>

  <!-- ── Планети (pivot-орбіта → планета) ── -->

  <!-- Меркурій -->
  <a-entity id="orbit-mercury" orbit="period:4;radius:8">
    <a-sphere radius="0.38" src="#tex-mercury" position="8 0 0"
              material="shader:standard;roughness:0.9"
              animation="property:rotation;to:0 360 0;loop:true;dur:5800;easing:linear"
              class="planet-obj" data-name="Меркурій"
              data-info="1-а планета. Відстань від Сонця: 57.9 млн км. Рік: 88 земних днів"></a-sphere>
  </a-entity>

  <!-- Венера -->
  <a-entity id="orbit-venus" orbit="period:10;radius:12">
    <a-sphere radius="0.95" src="#tex-venus" position="12 0 0"
              material="shader:standard;roughness:0.8"
              animation="property:rotation;to:0 -360 0;loop:true;dur:24300;easing:linear"
              class="planet-obj" data-name="Венера"
              data-info="2-а планета. Відстань: 108.2 млн км. Рік: 225 днів. Обертання зворотне"></a-sphere>
  </a-entity>

  <!-- Земля -->
  <a-entity id="orbit-earth" orbit="period:16;radius:17">
    <a-sphere radius="1" src="#tex-earth" position="17 0 0"
              material="shader:standard;roughness:0.7;metalness:0.1"
              animation="property:rotation;to:0 360 0;loop:true;dur:1460;easing:linear"
              class="planet-obj" data-name="Земля"
              data-info="3-я планета. Відстань: 149.6 млн км. Рік: 365.25 днів. Є життя!"></a-sphere>
  </a-entity>

  <!-- Марс -->
  <a-entity id="orbit-mars" orbit="period:25;radius:23">
    <a-sphere radius="0.53" src="#tex-mars" position="23 0 0"
              material="shader:standard;roughness:0.95"
              animation="property:rotation;to:0 360 0;loop:true;dur:1477;easing:linear"
              class="planet-obj" data-name="Марс"
              data-info="4-а планета. Відстань: 227.9 млн км. Рік: 687 днів. Червона планета"></a-sphere>
  </a-entity>

  <!-- Юпітер -->
  <a-entity id="orbit-jupiter" orbit="period:95;radius:38">
    <a-sphere radius="2.8" src="#tex-jupiter" position="38 0 0"
              material="shader:standard;roughness:0.6"
              animation="property:rotation;to:0 360 0;loop:true;dur:357;easing:linear"
              class="planet-obj" data-name="Юпітер"
              data-info="5-а планета. Відстань: 778.5 млн км. Рік: 11.86 р. Найбільша планета"></a-sphere>
  </a-entity>

  <!-- Сатурн + кільця -->
  <a-entity id="orbit-saturn" orbit="period:235;radius:55">
    <a-entity position="55 0 0">
      <a-sphere radius="2.3" src="#tex-saturn"
                material="shader:standard;roughness:0.7"
                animation="property:rotation;to:0 360 0;loop:true;dur:440;easing:linear"
                class="planet-obj" data-name="Сатурн"
                data-info="6-а планета. Відстань: 1.432 млрд км. Рік: 29.46 р. Кільця з льоду та пилу"></a-sphere>
      <!-- Кільця -->
      <a-torus radius="3.8" radius-tubular="0.8" segments-tubular="3" segments-radial="60"
               rotation="90 0 0"
               material="color:#c8a87a;opacity:0.55;transparent:true;side:double;shader:flat"></a-torus>
      <a-torus radius="4.8" radius-tubular="0.5" segments-tubular="3" segments-radial="60"
               rotation="90 0 0"
               material="color:#d4b896;opacity:0.35;transparent:true;side:double;shader:flat"></a-torus>
    </a-entity>
  </a-entity>

  <!-- Уран -->
  <a-entity id="orbit-uranus" orbit="period:675;radius:72">
    <a-sphere radius="1.6" src="#tex-uranus" position="72 0 0"
              material="shader:standard;roughness:0.5"
              animation="property:rotation;to:0 360 0;loop:true;dur:625;easing:linear;startEvents:click"
              class="planet-obj" data-name="Уран"
              data-info="7-а планета. Відстань: 2.867 млрд км. Рік: 84 р. Нахил осі ~98°"></a-sphere>
  </a-entity>

  <!-- Нептун -->
  <a-entity id="orbit-neptune" orbit="period:1300;radius:90">
    <a-sphere radius="1.55" src="#tex-neptune" position="90 0 0"
              material="shader:standard;roughness:0.5"
              animation="property:rotation;to:0 360 0;loop:true;dur:600;easing:linear"
              class="planet-obj" data-name="Нептун"
              data-info="8-а планета. Відстань: 4.515 млрд км. Рік: 164.8 р. Вітри 2100 км/год"></a-sphere>
  </a-entity>

  <!-- ── Орбітальні кільця (декоративні) ── -->
  <a-entity orbit-rings></a-entity>

  <!-- ── Камера ── -->
  <a-entity id="rig" position="0 10 50">
    <a-camera wasd-controls="acceleration:25" look-controls="pointerLockEnabled:false">
      <a-cursor color="#00d4ff" fuse="false" raycaster="objects:.planet-obj"></a-cursor>
    </a-camera>
  </a-entity>

</a-scene>

<script>
// ── Компонент орбіти (рівномірне обертання pivot-entity) ──
AFRAME.registerComponent('orbit', {
  schema: { period:{type:'number',default:10}, radius:{type:'number',default:10} },
  init(){
    this._angle = Math.random()*360; // початковий кут різний для кожної планети
  },
  tick(t, dt){
    this._angle += (360 / (this.data.period * 1000)) * dt;
    const r = this._angle * Math.PI/180;
    this.el.object3D.rotation.y = r;
  }
});

// ── Компонент для малювання орбітальних кіл ──
AFRAME.registerComponent('orbit-rings', {
  init(){
    const radii=[8,12,17,23,38,55,72,90];
    radii.forEach(r=>{
      const ring=document.createElement('a-torus');
      ring.setAttribute('radius', r);
      ring.setAttribute('radius-tubular', 0.04);
      ring.setAttribute('segments-tubular', 120);
      ring.setAttribute('rotation', '90 0 0');
      ring.setAttribute('material', 'color:#334466;opacity:0.35;transparent:true;shader:flat');
      this.el.appendChild(ring);
    });
  }
});

// ── Тултіп при наведенні ──
const tooltip=document.getElementById('tooltip');
document.querySelectorAll('.planet-obj').forEach(el=>{
  el.addEventListener('mouseenter',()=>{
    tooltip.textContent=`${el.dataset.name} — ${el.dataset.info}`;
    tooltip.style.display='block';
  });
  el.addEventListener('mouseleave',()=>{ tooltip.style.display='none'; });
});
</script>
</body>
</html>
