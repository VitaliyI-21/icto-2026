<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPipe Hands - Kinematics Analytics</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121214;
      color: #e1e1e6;
      display: flex;
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
    }
    #video-container {
      position: relative;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }
    #webcam, #output_canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: scaleX(-1); /* Дзеркальне відображення для зручності */
    }
    #dashboard {
      width: 400px;
      background: #1a1a1e;
      border-left: 2px solid #29292e;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    h2, h3 { margin: 0; color: #00ff66; text-transform: uppercase; letter-spacing: 1px; }
    h3 { color: #00bfff; font-size: 14px; margin-top: 10px; }
    .data-box {
      background: #202024;
      border: 1px solid #29292e;
      border-radius: 8px;
      padding: 12px;
    }
    .metric {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      font-family: monospace;
      font-size: 14px;
    }
    .val { color: #fff; font-weight: bold; }
  </style>
</head>
<body>

  <div id="video-container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div id="dashboard">
    <h2>Аналітика Руки</h2>
    <p style="font-size:12px; color:#7c7c8a; margin:0;">Обчислення кутів на основі 3D скалярного добутку векторів MCP-TIP.</p>
    
    <div class="data-box">
      <h3>Довжина пальців (px)</h3>
      <div class="metric">Великий: <span id="len-thumb" class="val">-</span></div>
      <div class="metric">Вказівний: <span id="len-index" class="val">-</span></div>
      <div class="metric">Середній: <span id="len-middle" class="val">-</span></div>
      <div class="metric">Підсердечний: <span id="len-ring" class="val">-</span></div>
      <div class="metric">Мізинець: <span id="len-pinky" class="val">-</span></div>
    </div>

    <div class="data-box">
      <h3>Кути між пальцями</h3>
      <div class="metric">Великий ↔ Вказівний: <span id="angle-t-i" class="val">-</span></div>
      <div class="metric">Вказівний ↔ Середній: <span id="angle-i-m" class="val">-</span></div>
      <div class="metric">Середній ↔ Підсердечний: <span id="angle-m-r" class="val">-</span></div>
      <div class="metric">Підсердечний ↔ Мізинець: <span id="angle-r-p" class="val">-</span></div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    // Функція обчислення вектора та його модуля (довжини) між двома точками
    function getFingerVectorAndLength(ptMCP, ptTIP) {
      const vec = {
        x: ptTIP.x - ptMCP.x,
        y: ptTIP.y - ptMCP.y,
        z: ptTIP.z - ptMCP.z
      };
      const length = Math.sqrt(vec.x**2 + vec.y**2 + vec.z**2);
      return { vec, length };
    }

    // Функція обчислення кута між двома 3D векторами через скалярний добуток
    function calculateAngleBetweenVectors(v1, v2) {
      const dotProduct = (v1.vec.x * v2.vec.x) + (v1.vec.y * v2.vec.y) + (v1.vec.z * v2.vec.z);
      const cosTheta = dotProduct / (v1.length * v2.length);
      // Обмеження значення в діапазоні [-1, 1] для уникнення помилок NaN в acos
      const clampedCos = Math.max(-1, Math.min(1, cosTheta));
      const angleRad = Math.acos(clampedCos);
      return (angleRad * 180) / Math.PI; // Перевід у градуси
    }

    function onResults(results) {
      // Адаптація розмірів полотна під відеопотік
      if (canvasElement.width !== videoElement.videoWidth) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
      }

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];

        // Малювання скелету руки поверх відео
        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00ff66', lineWidth: 4});
        drawLandmarks(canvasCtx, landmarks, {color: '#00bfff', lineWidth: 1, radius: 4});

        // Визначення тривимірних векторів та евклідової довжини пальців за точками MCP та TIP
        const thumb = getFingerVectorAndLength(landmarks[2], landmarks[4]);
        const index = getFingerVectorAndLength(landmarks[5], landmarks[8]);
        const middle = getFingerVectorAndLength(landmarks[9], landmarks[12]);
        const ring = getFingerVectorAndLength(landmarks[13], landmarks[16]);
        const pinky = getFingerVectorAndLength(landmarks[17], landmarks[20]);

        // Виведення довжини (множимо на коефіцієнт для умовного відображення в px екрану)
        document.getElementById('len-thumb').innerText = (thumb.length * 1000).toFixed(1);
        document.getElementById('len-index').innerText = (index.length * 1000).toFixed(1);
        document.getElementById('len-middle').innerText = (middle.length * 1000).toFixed(1);
        document.getElementById('len-ring').innerText = (ring.length * 1000).toFixed(1);
        document.getElementById('len-pinky').innerText = (pinky.length * 1000).toFixed(1);

        // Обчислення кутів між суміжними пальцями за допомогою скалярного добутку
        const angleTI = calculateAngleBetweenVectors(thumb, index);
        const angleIM = calculateAngleBetweenVectors(index, middle);
        const angleMR = calculateAngleBetweenVectors(middle, ring);
        const angleRP = calculateAngleBetweenVectors(ring, pinky);

        // Оновлення інтерфейсу результатами метрик
        document.getElementById('angle-t-i').innerText = angleTI.toFixed(1) + '°';
        document.getElementById('angle-i-m').innerText = angleIM.toFixed(1) + '°';
        document.getElementById('angle-m-r').innerText = angleMR.toFixed(1) + '°';
        document.getElementById('angle-r-p').innerText = angleRP.toFixed(1) + '°';
      }
      canvasCtx.restore();
    }

    // Ініціалізація MediaPipe Hands системи
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });
    hands.onResults(onResults);

    // Отримання потоку з камери пристрою
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 640,
      height: 480
    });
    camera.start();
  </script>
</body>
</html>
