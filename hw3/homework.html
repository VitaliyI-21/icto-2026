<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота 3</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-marker type="pattern" url="../markers/pattern-my-marker.patt">
            
            <a-entity rotation="-90 0 0" scale="0.3 0.3 0.3" position="0 0 0">
                
                <a-text 
                    value="Виконав Литвиненко Віталій Ім-25" 
                    font="../fonts/custom-msdf.json"
                    negate="false"
                    color="#FFFFFF" 
                    width="5" 
                    position="-2 2.5 0"
                    animation="property: scale; from: 1 1 1; to: 1.05 1.05 1.05; dir: alternate; loop: true; dur: 2000; easing: easeInOutQuad">
                </a-text>

                <a-sphere 
                    position="-1.5 0.5 0" 
                    radius="0.6" 
                    src="../images/sphere_texture.jpg"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
                </a-sphere>

                <a-box 
                    position="0 0.5 0" 
                    width="1.0" height="1.0" depth="1.0" 
                    src="../images/box_texture.jpg"
                    animation="property: material.color; from: #FFFFFF; to: #FF8888; dir: alternate; loop: true; dur: 3000">
                </a-box>

                <a-cylinder 
                    position="1.5 0.5 0" 
                    radius="0.4" 
                    height="1.2" 
                    color="#00BFFF"
                    animation="property: scale; from: 1 1 1; to: 1 1.2 1; dir: alternate; loop: true; dur: 1500; easing: easeInOutSine">
                </a-cylinder>

                <a-entity 
                    gltf-model="../models/duck.glb" 
                    position="0 1.0 0" 
                    scale="1 1 1"
                    rotation="0 140 0"
                    animation="property: rotation; to: 0 500 0; loop: true; dur: 8000; easing: linear">
                </a-entity>

            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
