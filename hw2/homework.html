<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота 2</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>

    <a-scene stats>

        <a-sky color="#1A1A2E"></a-sky>

        <a-light type="ambient" color="#FFF" intensity="0.5"></a-light>
        <a-light type="directional" position="3 5 1" color="#FFF" intensity="0.7"></a-light>

        <a-text 
            value="Виконав Литвиненко Віталій Ім-25" 
            font="../fonts/custom-msdf.json"
            negate="false"
            color="#FFFFFF" 
            width="6" 
            position="-2.5 3.5 -4"
            animation="property: scale; from: 1 1 1; to: 1.05 1.05 1.05; dir: alternate; loop: true; dur: 2000; easing: easeInOutQuad">
        </a-text>

        <a-entity position="0 0.5 -5">
            
            <a-sphere 
                position="-2 1 0" 
                radius="0.8" 
                src="../images/sphere_texture.jpg"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-sphere>

            <a-box 
                position="0 1 0" 
                width="1.2" height="1.2" depth="1.2" 
                src="../images/box_texture.jpg"
                animation="property: material.color; from: #FFFFFF; to: #FF8888; dir: alternate; loop: true; dur: 3000">
            </a-box>

            <a-cylinder 
                position="2 1 0" 
                radius="0.5" 
                height="1.5" 
                color="#00BFFF"
                animation="property: scale; from: 1 1 1; to: 1 1.3 1; dir: alternate; loop: true; dur: 1500; easing: easeInOutSine">
            </a-cylinder>

            <a-entity 
                gltf-model="../models/duck.glb" 
                position="0 1.6 0" 
                scale="1.3 1.3 1.3"
                rotation="0 140 0"
                animation="property: rotation; to: 0 500 0; loop: true; dur: 8000; easing: linear">
            </a-entity>

        </a-entity>

        <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" src="../images/ground.jpg" repeat="5 5"></a-plane>

        <a-entity position="0 1.6 0">
            <a-camera look-controls wasd-controls></a-camera>
        </a-entity>

    </a-scene>

</body>
</html>
