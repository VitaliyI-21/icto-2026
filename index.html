<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звіт про виконані завдання</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        h2 {
            font-size: 18px;
            color: #7f8c8d;
            font-weight: normal;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .card {
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 20px;
            background-color: #fafbfc;
        }
        .card h3 {
            margin-top: 0;
            color: #34495e;
        }
        .card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background-color: #3679dd;
            color: white;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 25px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 2px 5px rgba(3, 30, 185, 0.3);
        }
        .btn:hover {
            background-color: #070be4;
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Звіт про виконані завдання</h1>
        <h2>Студента групи Ім-25</h2>
        <h2>Литвиненко Віталія</h2>

        <div class="card">
            <h3>Домашнє завдання №1</h3>
            <p>Створення 3D-сцени за допомогою бібліотеки A-Frame.</p>
            
            <a href="hw1/homework.html" class="btn">Відкрити 3D-сцену</a>
        </div>
    </div>

</body>
</html>
