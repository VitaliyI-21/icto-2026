<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домашня робота 1 — Сцена A-Frame</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>

    <a-scene>
        
        <a-sky color="#7FFFD4" radius="10"></a-sky>

        <a-light type="ambient" color="#BBB"></a-light>
        <a-light type="directional" position="2 4 3" rotation="-90 0 0" color="#FFF" intensity="0.6"></a-light>

        <a-torus position="-2 1.5 -5" color="#FFD700" radius="1.2" tube="0.3"></a-torus>

        <a-cylinder position="2 0.5 -5" radius="0.5" height="1.5" color="#00BFFF"></a-cylinder>

        <a-plane position="0 -0.5 -5" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>

        <a-entity position="0 1.6 0">
            <a-camera></a-camera>
        </a-entity>

    </a-scene>

</body>
</html>
